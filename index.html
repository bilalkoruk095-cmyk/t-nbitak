
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Terminal - Şifreleme Protokolü</title>
    <style>
        @import url('https://fonts.googleapis.com/3css2?family=Share+Tech+Mono&display=swap');

        body {
            background-color: #000;
            color: #00ff41;
            font-family: 'Share Tech Mono', monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Matrix Arkaplan Efekti */
        #bg {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            opacity: 0.15;
        }

        .container {
            display: flex;
            gap: 40px;
            padding: 20px;
            z-index: 1;
        }

        .terminal-box {
            background: rgba(0, 20, 0, 0.8);
            border: 2px solid #00ff41;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.4), inset 0 0 10px rgba(0, 255, 65, 0.2);
            width: 320px;
            height: 450px;
            display: flex;
            flex-direction: column;
            position: relative;
            padding: 20px;
            box-sizing: border-box;
        }

        .terminal-header {
            position: absolute;
            top: -12px;
            left: 15px;
            background: #000;
            padding: 0 10px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            border: 1px solid #00ff41;
        }

        label {
            font-size: 12px;
            margin-bottom: 10px;
            opacity: 0.8;
            display: block;
        }

        textarea {
            background: transparent;
            border: 1px solid #008f11;
            color: #00ff41;
            font-family: inherit;
            flex-grow: 1;
            resize: none;
            padding: 10px;
            outline: none;
            transition: border 0.3s;
        }

        textarea:focus {
            border-color: #00ff41;
        }

        button {
            background: #00ff41;
            color: #000;
            border: none;
            padding: 12px;
            margin-top: 15px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        button:hover {
            background: #fff;
            box-shadow: 0 0 15px #fff;
        }

        #codeStream {
            font-size: 11px;
            color: #00ff41;
            white-space: pre-wrap;
            overflow-y: auto;
            height: 100%;
            scrollbar-width: none;
        }

        #codeStream::-webkit-scrollbar { display: none; }

        .result-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        #statusText {
            color: #fff;
            margin-bottom: 20px;
            height: 20px;
        }

        #finalOutput {
            font-size: 24px;
            word-break: break-all;
            text-shadow: 0 0 10px #00ff41;
            display: none;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 18px;
            background: #00ff41;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* Tarama Çizgisi */
        .scanline {
            width: 100%;
            height: 100px;
            z-index: 2;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(0, 255, 65, 0.1) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scanline 6s linear infinite;
        }

        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: -100px; }
        }
    </style>
</head>
<body>

<canvas id="bg"></canvas>
<div class="scanline"></div>

<div class="container">
    <!-- GİRİŞ -->
    <div class="terminal-box">
        <div class="terminal-header">Giriş Ünitesi</div>
        <label>>_ SİSTEME VERİ GİRİN:</label>
        <textarea id="userInput" placeholder="Mesajınızı buraya bırakın..."></textarea>
        <button onclick="runProtocol()">PROTOKOLÜ BAŞLAT</button>
    </div>

    <!-- İŞLEM -->
    <div class="terminal-box">
        <div class="terminal-header">Veri İşleme</div>
        <div id="codeStream">SİSTEM BEKLEMEDE...</div>
    </div>

    <!-- SONUÇ -->
    <div class="terminal-box">
        <div class="terminal-header">Çıkış Paneli</div>
        <div class="result-container">
            <div id="statusText">DURUM: HAZIR <span class="cursor"></span></div>
            <div id="finalOutput"></div>
        </div>
    </div>
</div>

<script>
    // Matrix Arkaplan Kodları
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=%#&_";
    const fontSize = 14;
    const columns = canvas.width / fontSize;
    const drops = [];
    for (let x = 0; x < columns; x++) drops[x] = 1;

    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0F0";
        ctx.font = fontSize + "px arial";
        for (let i = 0; i < drops.length; i++) {
            const text = chars.charAt(Math.floor(Math.random() * chars.length));
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(drawMatrix, 35);

    // Ana Fonksiyon
    function runProtocol() {
        const input = document.getElementById('userInput').value;
        const stream = document.getElementById('codeStream');
        const output = document.getElementById('finalOutput');
        const status = document.getElementById('statusText');

        if (!input) {
            status.innerHTML = "HATA: VERİ YOK <span class='cursor'></span>";
            return;
        }

        // Sıfırlama
        output.style.display = 'none';
        status.innerHTML = "İŞLENİYOR... <span class='cursor'></span>";
        stream.innerHTML = "";

        let frames = 0;
        const maxFrames = 40;

        const interval = setInterval(() => {
            let chunk = "";
            for (let i = 0; i < 15; i++) { // 15 satır rastgele kod
                chunk += ">> " + Math.random().toString(36).substring(2).toUpperCase() + 
                         " | " + Math.random().toString(16).substring(2).toUpperCase() + "\n";
            }
            stream.innerText = chunk;
            stream.scrollTop = stream.scrollHeight;

            frames++;
            if (frames > maxFrames) {
                clearInterval(interval);
                stream.innerHTML = ">>> ANALİZ TAMAMLANDI\n>>> ŞİFRELEME BAŞARILI\n>>> PROTOKOL SONLANDI";
                status.innerText = "KODUNUZ ŞİFRELENDİ:";
                output.innerText = input;
                output.style.display = 'block';
            }
        }, 80);
    }
</script>

</body>
</html>
