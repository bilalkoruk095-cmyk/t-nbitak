<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Şifreleme Ekranı</title>
    <style>
        body {
            background-color: #0d0d0d;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container { display: flex; gap: 30px; }
        .box {
            border: 1px solid #00ff41;
            padding: 15px;
            width: 250px;
            height: 250px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.2);
        }
        textarea {
            background: #1a1a1a;
            color: #00ff41;
            border: 1px solid #00ff41;
            height: 100px;
            resize: none;
            padding: 5px;
        }
        button {
            margin-top: 10px;
            background: #00ff41;
            color: #000;
            border: none;
            padding: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        #randomCodes {
            font-size: 11px;
            white-space: pre-wrap; /* Alt satırları destekler */
            overflow: hidden;
            color: #008f11;
            line-height: 1.2;
        }
        .result-text {
            margin-top: 10px;
            font-weight: bold;
            word-break: break-all;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="box">
        <label>METİN GİRİN:</label>
        <textarea id="metinInput" placeholder="Mesajınızı yazın..."></textarea>
        <button onclick="sifrele()">ŞİFRELE</button>
    </div>

    <div class="box">
        <label style="border-bottom: 1px solid; margin-bottom: 5px;">İŞLEM KAYDI:</label>
        <div id="randomCodes">BEKLENİYOR...</div>
    </div>

    <div class="box">
        <label id="sonucBaslik">SONUÇ:</label>
        <div id="sonucMetin" class="result-text"></div>
    </div>
</div>

<script>
function sifrele() {
    const input = document.getElementById('metinInput').value;
    const codeBox = document.getElementById('randomCodes');
    const resBox = document.getElementById('sonucMetin');
    const title = document.getElementById('sonucBaslik');

    if(!input) return;

    resBox.innerText = "";
    title.innerText = "İŞLENİYOR...";

    let sayac = 0;
    const dongu = setInterval(() => {
        // Her seferinde 8 satır rastgele karmaşık kod üretir
        let satirlar = "";
        for(let i=0; i<8; i++) {
            satirlar += Math.random().toString(36).substring(2).toUpperCase() + 
                        Math.random().toString(36).substring(2).toUpperCase() + "\n";
        }
        codeBox.innerText = satirlar;
        
        sayac++;
        if(sayac > 25) { // Yaklaşık 2.5 saniye sürer
            clearInterval(dongu);
            codeBox.innerText = ">> ŞİFRELEME TAMAMLANDI\n>> VERİ PAKETLENDİ\n>> STATUS: 200 OK";
            title.innerText = "KODUNUZ ŞİFRELENDİ:";
            resBox.innerText = input;
        }
    }, 100);
}
</script>

</body>
</html>
